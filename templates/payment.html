<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата USDT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
        h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-weight: 500;
        }
        input, select {
            width: 100%;
            padding: 14px;
            border: 2px solid #333;
            border-radius: 10px;
            font-size: 16px;
            background: #222;
            color: #fff;
            transition: border-color 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #4f46e5;
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #4f46e5 0%, #0099cc 100%);
            color: #000;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(79, 70, 229, 0.4);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .result {
            margin-top: 25px;
            padding: 20px;
            background: #0d2818;
            border: 2px solid #22c55e;
            border-radius: 10px;
            display: none;
        }
        .result.show { display: block; }
        .result h3 { color: #22c55e; margin-bottom: 15px; }
        .result p { margin-bottom: 10px; word-break: break-all; color: #ccc; }
        .result .label { color: #888; font-weight: 500; }
        .result .value { color: #fff; font-weight: 600; }
        .copy-btn {
            background: #22c55e;
            color: #000;
            margin-top: 10px;
            padding: 10px;
            font-size: 14px;
        }
        .error {
            background: #2d1515;
            border-color: #ef4444;
        }
        .error h3 { color: #ef4444; }
        .admin-link {
            text-align: center;
            margin-top: 20px;
        }
        .admin-link a {
            color: #4f46e5;
            text-decoration: none;
            font-size: 14px;
        }
        }
        .rate-display {
            background: linear-gradient(135deg, #1e1e3f 0%, #2d2d5a 100%);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #3d3d6b;
        }
        .rate-display .label {
            color: #888;
            font-size: 12px;
            margin-bottom: 5px;
        }
        .rate-display .label span {
            color: #ef4444;
            font-size: 11px;
        }
        .rate-display .value {
            color: #22c55e;
            font-size: 24px;
            font-weight: bold;
        }
        .rate-display .updating {
            color: #666;
            font-size: 12px;
        }
        .rate-progress {
            width: 100%;
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }
        .rate-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #4f46e5, #7c3aed);
            border-radius: 2px;
            width: 100%;
            transition: width 1s linear;
        }
        .receive-amount {
            font-size: 14px;
            color: #22c55e;
            margin-top: 5px;
            font-weight: 500;
        }
        }
        .timer-display {
            background: linear-gradient(135deg, #3d1515 0%, #5a2020 100%);
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
            text-align: center;
            border: 1px solid #6b3030;
        }
        .timer-display .label {
            color: #888;
            font-size: 12px;
            margin-bottom: 5px;
        }
        .timer-display .value {
            color: #ef4444;
            font-size: 28px;
            font-weight: bold;
        }
        .timer-display.expiring {
            background: linear-gradient(135deg, #3d1515 0%, #7a2020 100%);
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .payment-methods {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .payment-method {
            flex: 1;
            padding: 12px;
            background: #252525;
            border: 2px solid #333;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            color: #888;
            transition: all 0.3s;
        }
        .payment-method:hover {
            border-color: #4f46e5;
        }
        .payment-method.active {
            border-color: #4f46e5;
            background: #1a1a3a;
            color: #fff;
        }
        .hidden-field {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="rate-display">
            <div class="label">Курс USDT/RUB <span>(-3%)</span></div>
            <div class="value" id="usdtRate">Загрузка...</div>
            <div class="rate-progress">
                <div class="rate-progress-bar" id="rateProgressBar"></div>
            </div>
        </div>
        <h1>Оплата USDT</h1>
        <form id="paymentForm">
            <div class="form-group">
                <label>Сумма USDT</label>
                <input type="number" step="0.01" min="1" name="amount_usdt" id="amountInput" required placeholder="Введите сумму">
                <div class="receive-amount" id="receiveAmount">К получению: 0 ₽</div>
            </div>
            
            <div class="form-group">
                <label>Способ получения</label>
                <div class="payment-methods">
                    <div class="payment-method active" data-method="card" onclick="selectMethod('card')">
                        Карта
                    </div>
                    <div class="payment-method" data-method="spb" onclick="selectMethod('spb')">
                        СБП
                    </div>
                </div>
            </div>
            
            <div class="form-group" id="cardField">
                <label>Номер карты</label>
                <input type="text" name="card_number" placeholder="XXXX XXXX XXXX XXXX">
            </div>
            
            <div class="form-group hidden-field" id="spbField">
                <label>Банк для СБП</label>
                <select name="spb_bank" id="spbBankSelect">
                    <option value="">Выберите банк</option>
                    <option value="Сбербанк">Сбербанк</option>
                    <option value="Тинькофф">Тинькофф</option>
                    <option value="Альфа-Банк">Альфа-Банк</option>
                    <option value="ВТБ">ВТБ</option>
                    <option value="Райффайзен">Райффайзен</option>
                    <option value="Газпромбанк">Газпромбанк</option>
                    <option value="Открытие">Открытие</option>
                    <option value="Почта Банк">Почта Банк</option>
                    <option value="РНКБ">РНКБ</option>
                    <option value="Ак Барс">Ак Барс</option>
                    <option value="Уралсиб">Уралсиб</option>
                </select>
            </div>
            
            <div class="form-group hidden-field" id="phoneField">
                <label>Номер телефона для СБП</label>
                <input type="tel" name="phone" placeholder="+7 999 123-45-67">
            </div>
            
            <button type="submit" id="submitBtn">Создать заказ</button>
        </form>
        
        <div id="result" class="result">
            <h3>Заказ создан!</h3>
            <p><span class="label">ID заказа:</span> <span class="value" id="resOrderId"></span></p>
            <p><span class="label">Сумма:</span> <span class="value" id="resAmount"></span> USDT</p>
            <p><span class="label">Адрес для оплаты (TRC20):</span></p>
            <p class="value" id="resAddress"></p>
            <button class="copy-btn" onclick="copyAddress()">Копировать адрес</button>
            <div style="margin-top: 15px; text-align: center;">
                <p class="label" style="margin-bottom: 10px;">QR код для оплаты:</p>
                <div id="qrCode" style="display: inline-block;"></div>
            </div>
            <p style="margin-top: 15px;"><span class="label">Статус:</span> <span class="value" id="resStatus"></span></p>
            <div class="timer-display" id="timerDisplay">
                <div class="label">Время до истечения заказа</div>
                <div class="value" id="timerValue">15:00</div>
                <div class="rate-progress">
                    <div class="rate-progress-bar" id="timerProgressBar"></div>
                </div>
            </div>
        </div>
        
        <div class="admin-link">
            <a href="/admin">Админ-панель</a>
        </div>
    </div>

    <script>
        let currentRate = 0;
        let selectedMethod = 'card';
        
        function selectMethod(method) {
            selectedMethod = method;
            document.querySelectorAll('.payment-method').forEach(el => {
                el.classList.remove('active');
            });
            document.querySelector(`[data-method="${method}"]`).classList.add('active');
            
            const cardField = document.getElementById('cardField');
            const spbField = document.getElementById('spbField');
            const phoneField = document.getElementById('phoneField');
            
            if (method === 'card') {
                cardField.classList.remove('hidden-field');
                spbField.classList.add('hidden-field');
                phoneField.classList.add('hidden-field');
            } else {
                cardField.classList.add('hidden-field');
                spbField.classList.remove('hidden-field');
                phoneField.classList.remove('hidden-field');
            }
        }
        
        function updateReceiveAmount() {
            const amount = parseFloat(document.getElementById('amountInput').value) || 0;
            const receive = (amount * currentRate).toFixed(2);
            document.getElementById('receiveAmount').textContent = 'К получению: ' + receive + ' ₽';
        }
        
        document.getElementById('amountInput').addEventListener('input', updateReceiveAmount);
        
        document.getElementById('paymentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const form = e.target;
            const formData = new FormData(form);
            
            btn.disabled = true;
            btn.textContent = 'Создание заказа...';
            
            try {
                let paymentDetails = {};
                
                if (selectedMethod === 'card') {
                    paymentDetails = {
                        method: 'card',
                        card_number: formData.get('card_number')
                    };
                } else {
                    paymentDetails = {
                        method: 'spb',
                        spb_bank: formData.get('spb_bank'),
                        phone: formData.get('phone')
                    };
                }
                
                const amount = parseFloat(formData.get('amount_usdt'));
                const receiveAmount = (amount * currentRate).toFixed(2);
                
                const payload = {
                    amount_usdt: amount,
                    receive_amount: parseFloat(receiveAmount),
                    ...paymentDetails
                };
                console.log('Sending:', JSON.stringify(payload));
                
                const response = await fetch('/api/orders', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                
                const text = await response.text();
                console.log('Response:', text, 'Status:', response.status);
                
                if (!response.ok) {
                    alert('Ошибка: ' + text);
                    btn.disabled = false;
                    btn.textContent = 'Создать заказ';
                    return;
                }
                
                const data = JSON.parse(text);
                
                if (response.ok) {
                    document.getElementById('resOrderId').textContent = data.order_id;
                    document.getElementById('resAmount').textContent = data.amount_usdt;
                    document.getElementById('resAddress').textContent = data.deposit_address;
                    document.getElementById('resStatus').textContent = data.status;
                    document.getElementById('result').classList.add('show');
                    document.getElementById('result').classList.remove('error');
                    form.style.display = 'none';
                    
                    document.getElementById('qrCode').innerHTML = '';
                    new QRCode(document.getElementById('qrCode'), {
                        text: data.deposit_address,
                        width: 180,
                        height: 180
                    });
                    
                    startOrderTimer(data.order_id);
                } else {
                    alert('Ошибка: ' + (data.detail || 'Unknown error'));
                }
            } catch (error) {
                console.error(error);
                alert('Ошибка: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Создать заказ';
            }
        });
        
        function copyAddress() {
            const address = document.getElementById('resAddress').textContent;
            navigator.clipboard.writeText(address).then(() => {
                alert('Адрес скопирован!');
            });
        }
        
        let rateCountdown = 60;
        
        async function fetchRate() {
            try {
                const response = await fetch('/api/rate');
                const data = await response.json();
                
                if (data.rate) {
                    currentRate = (parseFloat(data.rate) * 0.97).toFixed(2);
                    document.getElementById('usdtRate').textContent = currentRate + ' ₽';
                    rateCountdown = 60;
                    updateReceiveAmount();
                } else {
                    document.getElementById('usdtRate').textContent = 'Курс не найден';
                }
            } catch (error) {
                console.error('Rate fetch error:', error);
                document.getElementById('usdtRate').textContent = 'Ошибка загрузки';
            }
        }
        
        function updateProgressBar() {
            rateCountdown--;
            const percentage = (rateCountdown / 60) * 100;
            document.getElementById('rateProgressBar').style.width = percentage + '%';
            
            if (rateCountdown <= 0) {
                fetchRate();
            }
        }
        
        if (!window.rateInterval) {
            fetchRate();
            window.rateInterval = setInterval(updateProgressBar, 1000);
        }
        
        let orderTimerInterval = null;
        let orderTimerCountdown = 900;
        
        function startOrderTimer(orderId) {
            if (orderTimerInterval) {
                clearInterval(orderTimerInterval);
            }
            
            orderTimerCountdown = 900;
            updateOrderTimerDisplay();
            
            orderTimerInterval = setInterval(async () => {
                orderTimerCountdown--;
                updateOrderTimerDisplay();
                
                if (orderTimerCountdown <= 0) {
                    clearInterval(orderTimerInterval);
                    document.getElementById('resStatus').textContent = 'expired';
                    return;
                }
                
                const statusEl = document.getElementById('resStatus');
                if (statusEl.textContent === 'pending' || statusEl.textContent === 'paid' || statusEl.textContent === 'expired' || statusEl.textContent === 'canceled') {
                    clearInterval(orderTimerInterval);
                    return;
                }
            }, 1000);
        }
        
        function updateOrderTimerDisplay() {
            const minutes = Math.floor(orderTimerCountdown / 60);
            const seconds = orderTimerCountdown % 60;
            const timeStr = minutes.toString().padStart(2, '0') + ':' + seconds.toString().padStart(2, '0');
            
            document.getElementById('timerValue').textContent = timeStr;
            
            const percentage = (orderTimerCountdown / 900) * 100;
            document.getElementById('timerProgressBar').style.width = percentage + '%';
            
            const timerDisplay = document.getElementById('timerDisplay');
            if (orderTimerCountdown <= 120) {
                timerDisplay.classList.add('expiring');
            } else {
                timerDisplay.classList.remove('expiring');
            }
        }
    </script>
</body>
</html>

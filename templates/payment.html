<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата USDT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #1a1a2e;
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        input, select {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #4f46e5;
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(79, 70, 229, 0.4);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .result {
            margin-top: 25px;
            padding: 20px;
            background: #f0fdf4;
            border: 2px solid #22c55e;
            border-radius: 10px;
            display: none;
        }
        .result.show { display: block; }
        .result h3 { color: #16a34a; margin-bottom: 15px; }
        .result p { margin-bottom: 10px; word-break: break-all; }
        .result .label { color: #666; font-weight: 500; }
        .result .value { color: #1a1a2e; font-weight: 600; }
        .copy-btn {
            background: #22c55e;
            margin-top: 10px;
            padding: 10px;
            font-size: 14px;
        }
        .error {
            background: #fef2f2;
            border-color: #ef4444;
        }
        .error h3 { color: #dc2626; }
        .admin-link {
            text-align: center;
            margin-top: 20px;
        }
        .admin-link a {
            color: #4f46e5;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Оплата USDT</h1>
        <form id="paymentForm">
            <div class="form-group">
                <label>Сумма USDT</label>
                <input type="number" step="0.01" min="1" name="amount_usdt" required placeholder="Введите сумму">
            </div>
            <div class="form-group">
                <label>Банк</label>
                <select name="bank" required>
                    <option value="">Выберите банк</option>
                    <option value="Сбербанк">Сбербанк</option>
                    <option value="Тинькофф">Тинькофф</option>
                    <option value="Альфа-Банк">Альфа-Банк</option>
                    <option value="ВТБ">ВТБ</option>
                    <option value="Райффайзен">Райффайзен</option>
                    <option value="Газпромбанк">Газпромбанк</option>
                </select>
            </div>
            <div class="form-group">
                <label>Номер телефона</label>
                <input type="tel" name="phone" required placeholder="+7 999 123-45-67">
            </div>
            <button type="submit" id="submitBtn">Создать заказ</button>
        </form>
        
        <div id="result" class="result">
            <h3>Заказ создан!</h3>
            <p><span class="label">ID заказа:</span> <span class="value" id="resOrderId"></span></p>
            <p><span class="label">Сумма:</span> <span class="value" id="resAmount"></span> USDT</p>
            <p><span class="label">Адрес для оплаты (TRC20):</span></p>
            <p class="value" id="resAddress"></p>
            <button class="copy-btn" onclick="copyAddress()">Копировать адрес</button>
            <div style="margin-top: 15px; text-align: center;">
                <p class="label" style="margin-bottom: 10px;">QR код для оплаты:</p>
                <div id="qrCode" style="display: inline-block;"></div>
            </div>
            <p style="margin-top: 15px;"><span class="label">Статус:</span> <span class="value" id="resStatus"></span></p>
        </div>
        
        <div class="admin-link">
            <a href="/admin">Админ-панель</a>
        </div>
    </div>

    <script>
        document.getElementById('paymentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const form = e.target;
            const formData = new FormData(form);
            
            btn.disabled = true;
            btn.textContent = 'Создание заказа...';
            
            try {
                const response = await fetch('/api/orders', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        amount_usdt: parseFloat(formData.get('amount_usdt')),
                        bank: formData.get('bank'),
                        phone: formData.get('phone')
                    })
                });
                
                const text = await response.text();
                console.log('Response:', text);
                
                if (!response.ok) {
                    alert('Ошибка: ' + text);
                    btn.disabled = false;
                    btn.textContent = 'Создать заказ';
                    return;
                }
                
                const data = JSON.parse(text);
                
                if (response.ok) {
                    document.getElementById('resOrderId').textContent = data.order_id;
                    document.getElementById('resAmount').textContent = data.amount_usdt;
                    document.getElementById('resAddress').textContent = data.deposit_address;
                    document.getElementById('resStatus').textContent = data.status;
                    document.getElementById('result').classList.add('show');
                    document.getElementById('result').classList.remove('error');
                    form.style.display = 'none';
                    
                    document.getElementById('qrCode').innerHTML = '';
                    new QRCode(document.getElementById('qrCode'), {
                        text: data.deposit_address,
                        width: 180,
                        height: 180
                    });
                } else {
                    alert('Ошибка: ' + (data.detail || 'Unknown error'));
                }
            } catch (error) {
                console.error(error);
                alert('Ошибка: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Создать заказ';
            }
        });
        
        function copyAddress() {
            const address = document.getElementById('resAddress').textContent;
            navigator.clipboard.writeText(address).then(() => {
                alert('Адрес скопирован!');
            });
        }
    </script>
</body>
</html>
